<!doctype html>
<html lang="{{ page.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} · {% endif %}Horo Coach</title>
    <meta name="description" content="{{ page.description | default: 'Horo Coach helps Apple Watch users turn workout data into clear, actionable progress.' }}" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/site.css" />
  </head>
  <body class="{% if page.page_class %}{{ page.page_class }}{% endif %}">
    <div class="site-bg" aria-hidden="true">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
    </div>

    {% include site-header.html %}

    <main id="main-content" class="site-main" tabindex="-1">
      {{ content }}
    </main>

    {% include site-footer.html %}

    <script src="assets/js/site.js" defer></script>
  </body>
</html>
